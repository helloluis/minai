services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "pnpm db:migrate && pnpm --filter @minai/api dev"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - pi-workspaces:/root/pi-workspaces
    ports:
      - "3001:3001"
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/minai
      API_PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "cd apps/web && npx next dev --port 3002 --hostname 0.0.0.0"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    ports:
      - "3002:3002"
    environment:
      API_URL: http://api:3001
    depends_on:
      - api

volumes:
  pgdata:
  pi-workspaces:
