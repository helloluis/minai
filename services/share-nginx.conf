# share.minai.work — public shared posts
server {
    listen 80;
    server_name share.minai.work;
    return 301 https://share.minai.work$request_uri;
}

server {
    listen 443 ssl;
    server_name share.minai.work;

    ssl_certificate /etc/letsencrypt/live/minai.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minai.work/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Static assets — pass through without rewrite
    location /_next/ {
        proxy_pass http://localhost:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Favicon, icons, etc.
    location ~ ^/(favicon|icon|.*\.(svg|png|ico))$ {
        proxy_pass http://localhost:3007;
        proxy_set_header Host $host;
    }

    # Root → redirect to main site
    location = / {
        return 302 https://minai.work;
    }

    # Everything else: rewrite slug → /share/slug
    location / {
        rewrite ^/(.+)$ /share/$1 break;
        proxy_pass http://localhost:3007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
